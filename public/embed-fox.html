  <script>
(function() {
  const btn = document.getElementById('embedBtn');
  const modal = document.getElementById('embedModal');
  const closeBtn = document.getElementById('embedClose');
  const copyBtn = document.getElementById('embedCopy');
  const codeEl = document.getElementById('embedCode');


  const embedCode =
    '<iframe src="' + window.location.href + '" ' +

    'allow="autoplay; encrypted-media; picture-in-picture; fullscreen" ' +
    'allowfullscreen></iframe>';

  let hideTimer;
  let modalOpen = false;
  function showBtn() {

    clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      if (!modalOpen) btn.classList.remove('visible');
    }, 2500);
  }
  document.addEventListener('mousemove', showBtn);
  document.addEventListener('touchstart', showBtn, { passive: true });
  btn.addEventListener('mouseenter', function() { clearTimeout(hideTimer); });
  btn.addEventListener('mouseleave', showBtn);
  showBtn(); // show briefly on load


  function copyText(text, srcBtn) {
    const done = function() {
      if (!srcBtn) return;
      const orig = srcBtn.textContent;
      srcBtn.textContent = 'Copied!';
      setTimeout(function() { srcBtn.textContent = orig; }, 1500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else {
      fallback();
    }
    function fallback() {
      codeEl.removeAttribute('readonly');
      codeEl.focus();
      codeEl.select();
      codeEl.setSelectionRange(0, codeEl.value.length);
      try { document.execCommand('copy'); } catch (e) {}
      codeEl.setAttribute('readonly', '');
      done();
    }
  }


  function openModal() {
    modal.classList.add('open');
    modalOpen = true;
    clearTimeout(hideTimer);
    copyText(embedCode); // copy immediately on click
  }
  function closeModal() {
    modal.classList.remove('open');
    modalOpen = false;
    showBtn();
  }

  btn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  copyBtn.addEventListener('click', function() { copyText(embedCode, copyBtn); });
  modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && modalOpen) closeModal(); });
})();
